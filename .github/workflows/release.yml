name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -v
  # Go modules are published by pushing a git tag (e.g., v1.1.0).
  # No separate publish step needed — `go get` fetches from the tagged commit.
  # The tag push that triggers this workflow IS the publish mechanism.
