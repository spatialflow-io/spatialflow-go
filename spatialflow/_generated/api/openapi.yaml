  /api/v1/locations:
    post:
      description: |-
        Ingest a single location point.

        This endpoint accepts location updates from external systems and queues them
        for asynchronous processing with GPS jitter reduction filters.

        Authentication: API Key (Bearer token)
        Rate Limit: 1000 requests/minute per API key

        PRD Reference: §3.4 Public Ingest API

        Returns:
            202 Accepted: Location queued for processing
            400 Bad Request: Invalid location data
            401 Unauthorized: Missing or invalid API key
            429 Too Many Requests: Rate limit exceeded

        Example:
            ```bash
            curl -X POST https://api.spatialflow.io/api/v1/locations \
              -H "Authorization: Bearer sf_live_abc123..." \
              -H "Content-Type: application/json" \
              -d '{
                "device_id": "truck-005",
                "lat": 40.7589,
                "lon": -73.9851,
                "ts": "2025-10-01T14:30:00Z",
                "accuracy": 8.5
              }'
            ```
      operationId: apps_public_locations_api_ingest_location
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationPointIn'
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationIngestResponse'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response
                type: object
          description: Bad Request
        "429":
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response
                type: object
          description: Too Many Requests
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Validation Error
      security:
      - JWTBearer: []
      - APIKeyBearer: []
      summary: Ingest Location
      tags:
      - Public Location Ingest
  /api/v1/locations/batch:
    post:
      description: |-
        Ingest a batch of location points.

        Accepts up to 5000 locations per batch (PRD §3.4). Each location is validated
        and processed asynchronously as a single batch task.

        **Idempotency:** If `idempotency_key` is provided, duplicate requests with the
        same key within 24 hours will return the original response without reprocessing.

        Authentication: API Key (Bearer token)
        Rate Limit: 100 batches/minute per API key

        PRD Reference: §3.4 Public Ingest API

        Returns:
            202 Accepted: Locations queued (includes counts of accepted/rejected)
            400 Bad Request: Invalid batch data
            401 Unauthorized: Missing or invalid API key
            429 Too Many Requests: Rate limit exceeded

        Example:
            ```bash
            curl -X POST https://api.spatialflow.io/api/v1/locations/batch \
              -H "Authorization: Bearer sf_live_abc123..." \
              -H "Content-Type: application/json" \
              -d '{
                "locations": [
                  {"device_id": "truck-005", "lat": 40.7589, "lon": -73.9851, "ts": "2025-10-01T14:30:00Z"},
                  {"device_id": "truck-005", "lat": 40.7590, "lon": -73.9850, "ts": "2025-10-01T14:31:00Z"}
                ],
                "idempotency_key": "batch-20251001-001"
              }'
            ```
      operationId: apps_public_locations_api_ingest_location_batch
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationBatchIn'
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationIngestResponse'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response
                type: object
          description: Bad Request
        "429":
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response
                type: object
          description: Too Many Requests
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Validation Error
      security:
