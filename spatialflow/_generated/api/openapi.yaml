openapi: 3.1.0
info:
  description: "Real-time geospatial automation platform API.\n\n## Authentication\n\
    \n**API Key:** Include `X-API-Key` header\n**JWT Token:** Include `Authorization:\
    \ Bearer <token>` header\n\n## Rate Limits\n\n- Authenticated: 1,000 requests\
    \ per hour (per API key, JWT, or session)\n- Anonymous: 100 requests per hour\n\
    \n## Webhook Verification\n\nOutbound webhooks include HMAC-SHA256 signatures\
    \ in `X-SF-Signature` header.\n\n## Support\n\n- Documentation: https://docs.spatialflow.io\n\
    - GitHub: https://github.com/spatialflow/spatialflow\n- Email: support@spatialflow.io\n\
    \    "
  title: SpatialFlow API
  version: v1.1.0
servers:
- description: Production
  url: https://api.spatialflow.io
paths:
  /api/v1/public/status:
    get:
      description: Public status endpoint with admin approval information.
      operationId: apps_public_api_status
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: {}
                title: Response
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Validation Error
      summary: Status
      tags:
      - Public
  /api/v1/public/runtime-config:
    get:
      description: |-
        Get runtime configuration for frontend applications.

        This endpoint provides dynamic configuration that was previously only available
        as build-time environment variables. Allows Admin UI to control feature toggles
        without requiring frontend rebuilds (Issue #119).

        Response includes only safe-to-expose public configuration:
        - Feature toggles (Route Tester, admin approval)
        - Analytics configuration (enabled flag, host URL - NOT API keys)

        Note: API keys and sensitive values are NEVER returned from this endpoint.

        Rate limited: 120/minute per IP to prevent abuse while allowing frequent
        frontend polling (e.g., SPA init, tab reopens).

        Caching: Response is cached for 30 seconds to reduce database lookups.
        ConfigurationService also has its own 5-minute cache layer.
      operationId: apps_public_api_runtime_config
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response
                type: object
          description: OK
        "429":
          content:
            application/json:
              schema:
                additionalProperties: {}
                title: Response
          description: Too Many Requests
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Validation Error
      summary: Runtime Config
      tags:
      - Public
