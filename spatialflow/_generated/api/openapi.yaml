          description: Unauthorized
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Validation Error
      security:
      - JWTBearer: []
      summary: Remove Member
      tags:
      - Workspaces
    patch:
      description: |-
        Update a member's role (PRD §4).

        Role management rules:
        - Owners: Can change any role (including promoting to owner)
        - Managers: Can change to manager, field_worker, or member (NOT owner)
        - Field workers/members: Cannot change roles

        Cannot demote the last owner.

        On any permission downgrade, immediately invalidates all tokens
        for the affected user. They must re-authenticate to get new
        tokens with the updated role.
