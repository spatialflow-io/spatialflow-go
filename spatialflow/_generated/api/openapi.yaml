components:
  schemas:
    SignupRequest:
      example:
        use_case: use_case
        utm_term: utm_term
        password: password
        selected_plan: free
        website: website
        utm_campaign: utm_campaign
        utm_medium: utm_medium
        name: name
        company: company
        email: email
        utm_source: utm_source
        utm_content: utm_content
      properties:
        email:
          format: email
          title: Email
          type: string
        password:
          title: Password
          type: string
        name:
          nullable: true
          type: string
        company:
          nullable: true
          type: string
        use_case:
          nullable: true
          type: string
        selected_plan:
          default: free
          enum:
          - free
          - pro
          - business
          - enterprise
          title: Selected Plan
          type: string
        utm_source:
          nullable: true
          type: string
        utm_medium:
          nullable: true
          type: string
        utm_campaign:
          nullable: true
          type: string
        utm_term:
          nullable: true
          type: string
        utm_content:
          nullable: true
          type: string
        website:
          nullable: true
          type: string
      required:
      - email
      - password
      title: SignupRequest
    ContactRequest:
      example:
        use_case: fleet
        website: website
        name: name
        company: company
        message: message
        email: email
      properties:
        name:
          title: Name
          type: string
        email:
          title: Email
          type: string
        company:
          nullable: true
          type: string
        use_case:
          enum:
          - fleet
          - workforce
          - secure
          - other
          title: Use Case
          type: string
        message:
          title: Message
          type: string
        website:
          nullable: true
          type: string
      required:
      - email
      - message
      - name
      - use_case
      title: ContactRequest
    LocationIngestResponse:
      description: |-
        Response for location ingestion (PRD §3.4 compliant).

        Returns counts and event IDs/idempotency keys for tracking.
      example:
        rejected: 6
        accepted: 0
        ids:
        - ids
        - ids
        idempotency_key: idempotency_key
        task_ids:
        - task_ids
        - task_ids
        errors:
        - key: ""
        - key: ""
      properties:
        accepted:
          title: Accepted
          type: integer
        rejected:
          title: Rejected
          type: integer
        ids:
          items:
            type: string
          nullable: true
          type: array
        idempotency_key:
          nullable: true
          type: string
        errors:
          items:
            additionalProperties: true
            type: object
          nullable: true
          type: array
        task_ids:
          items:
            type: string
          nullable: true
          type: array
      required:
      - accepted
      - rejected
      title: LocationIngestResponse
    LocationPointIn:
      description: |-
        Single location point for ingestion.

        PRD Reference: §3.4 Location Ingest Format
      example:
        accuracy: 8.5
        altitude: 10.0
        device_id: truck-005
        heading: 270
        lat: 40.7589
        lon: -73.9851
        metadata:
          driver: Alice Johnson
          route_id: route-123
          vehicle_type: delivery_truck
        speed: 12.5
        ts: 2025-10-01T14:30:00Z
      properties:
        device_id:
          title: Device Id
          type: string
        lat:
          title: Lat
          type: number
        lon:
          title: Lon
          type: number
        ts:
          format: date-time
          title: Ts
          type: string
        accuracy:
          nullable: true
          type: number
        speed:
          nullable: true
          type: number
        heading:
          minimum: 0
          nullable: true
          type: number
        altitude:
          nullable: true
          type: number
        metadata:
          additionalProperties: true
          nullable: true
          type: object
      required:
      - device_id
      - lat
      - lon
      - ts
      title: LocationPointIn
    LocationBatchIn:
      description: |-
        Batch of location points for bulk ingestion.

        Maximum 5000 points per batch (PRD §3.4).
      example:
        idempotency_key: batch-20251001-001
        locations:
        - accuracy: 8.5
          device_id: truck-005
          lat: 40.7589
          lon: -73.9851
          ts: 2025-10-01T14:30:00Z
        - accuracy: 7.2
          device_id: truck-005
          lat: 40.759
          lon: -73.985
          ts: 2025-10-01T14:31:00Z
      properties:
        locations:
          items:
            $ref: '#/components/schemas/LocationPointIn'
          type: array
        idempotency_key:
          nullable: true
          type: string
      required:
      - locations
      title: LocationBatchIn
    LoginResponse:
      example:
        access_token: access_token
        refresh_token: refresh_token
        token_type: token_type
        expires_in: 0
        user:
          selected_plan: selected_plan
          role: role
