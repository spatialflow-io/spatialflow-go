  /api/v1/devices/{uuid}/sessions/{session_id}/locations:
    get:
      description: |-
        Get locations for a specific session with pagination or simplification.

        Returns GPS track points recorded during the session.

        **Pagination mode** (default): Use `limit` and `offset` to paginate through all points.

        **Simplification mode**: Set `max_points` to return a simplified track using
        Douglas-Peucker algorithm (PostGIS ST_Simplify). Useful for rendering long tracks
        without loading all points. When `max_points` is set, pagination is ignored.

        Important notes for simplification mode:
        - `max_points` is a **target**, not a hard cap. Actual count may vary based on track shape.
        - When `simplified=true`, timestamps are **linearly interpolated** between session
          start/end and should not be used for speed or pause analysis.
        - Accuracy, speed, and heading are lost during simplification (returned as null).

        Note: Track history only includes location updates that pass quality filters
        (accuracy <= 100m, minimum movement distance). This ensures clean GPS tracks
        without jitter or poor-quality readings.

        - Managers/owners: Can view locations for any workspace device
        - Field workers: Can only view locations for their own device
      operationId: apps_devices_api_get_session_locations
      parameters:
      - explode: false
        in: path
        name: uuid
        required: true
        schema:
          format: uuid
          title: Uuid
          type: string
        style: simple
      - explode: false
        in: path
        name: session_id
        required: true
        schema:
          format: uuid
          title: Session Id
          type: string
        style: simple
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 1000
          maximum: 10000
          title: Limit
          type: integer
        style: form
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          title: Offset
          type: integer
        style: form
      - explode: true
        in: query
        name: max_points
        required: false
        schema:
          maximum: 10000
          minimum: 2
          nullable: true
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLocationsOut'
          description: OK
        "404":
          content:
            application/json:
              schema:
